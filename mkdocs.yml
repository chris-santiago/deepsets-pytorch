site_name: Deep Sets
site_description: PyTorch implementation of Deep Sets — permutation invariant and equivariant neural networks on sets.
site_author: Deep Sets Contributors
repo_url: https://github.com/chrissantiago/deepsets
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Getting Started: tutorials/getting-started.md
      - Training a Model: tutorials/training-a-model.md
  - How-to Guides:
      - Overview: how-to/index.md
      - Variable-Size Sets: how-to/variable-size-sets.md
      - Pooling Strategies: how-to/pooling-strategies.md
      - Equivariant Models: how-to/equivariant-models.md
      - Conditional Models: how-to/conditional-models.md
  - Reference:
      - Overview: reference/index.md
      - API Reference: reference/api.md
  - Explanation:
      - Overview: explanation/index.md
      - Deep Sets Theory: explanation/theory.md
      - Architecture Decisions: explanation/architecture.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - def_list

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
